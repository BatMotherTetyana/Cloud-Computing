services:
  users-service:
    container_name: users-service
    build: ./users-service
    expose: [3001]
  products-service:
    container_name: products-service
    build: ./products-service
    expose: [3002]
  orders-service:
    container_name: orders-service
    build: ./orders-service
    expose: [3003]
  api-gateway:
    container_name: api-gateway
    image: nginx:alpine
    ports: ["9090:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro